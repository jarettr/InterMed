name: ci

on:
  workflow_dispatch:
  push:
    branches: ["**"]
  pull_request:

jobs:
  alpha-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Clean checkout preparation
        run: |
          git clean -ffdx
          chmod +x gradlew test-harness/run.sh

      - name: Gradle version
        run: ./gradlew --version

      - name: Run mandatory public-alpha app gate
        run: ./gradlew :app:test :app:coverageGate :app:strictSecurity :app:verifyRuntime --rerun-tasks -Dintermed.allowRemoteForgeRepo=true --console=plain

      - name: Run mandatory harness self-test gate
        run: ./gradlew :test-harness:test --rerun-tasks --console=plain

      - name: Upload alpha-gate reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alpha-gate-reports
          path: |
            app/build/reports
            app/build/test-results
            test-harness/build/reports
            test-harness/build/test-results
