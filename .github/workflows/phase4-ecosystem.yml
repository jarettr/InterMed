name: alpha-evidence-rehearsal

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

jobs:
  rehearse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Clean checkout preparation
        run: |
          git clean -ffdx
          chmod +x gradlew test-harness/run.sh

      - name: Build launcher/runtime artifacts
        run: ./gradlew :app:coreJar :app:coreFabricJar :app:bootstrapJar :test-harness:harnessJar -Dintermed.allowRemoteForgeRepo=true --console=plain

      - name: Generate nightly alpha evidence rehearsal artifacts
        run: |
          set -euo pipefail
          REPORT_DIR="$GITHUB_WORKSPACE/build/reports/phase4"
          GAME_DIR="$GITHUB_WORKSPACE/build/phase4/game"
          MODS_DIR="$GITHUB_WORKSPACE/build/phase4/mods"
          mkdir -p "$REPORT_DIR" "$GAME_DIR" "$MODS_DIR"

          CORE_JAR="$(find app/build/libs -maxdepth 1 -type f -name 'InterMedCore*.jar' ! -name '*-bootstrap.jar' ! -name '*-fabric.jar' ! -name '*-thin.jar' ! -name '*-sources.jar' | sort | tail -n 1)"
          if [[ -z "${CORE_JAR:-}" ]]; then
            echo "[phase4] Unable to locate versioned InterMedCore runtime jar."
            exit 1
          fi

          java -cp "$CORE_JAR" org.intermed.launcher.InterMedLauncher alpha-release-reports \
            --project-root "$GITHUB_WORKSPACE" \
            --game-dir "$GAME_DIR" \
            --mods-dir "$MODS_DIR" \
            --output-dir "$REPORT_DIR"

      - name: Upload rehearsal artifacts
        uses: actions/upload-artifact@v4
        with:
          name: intermed-alpha-evidence-rehearsal
          path: |
            build/reports/phase4
            app/build/libs
            test-harness/build/libs
