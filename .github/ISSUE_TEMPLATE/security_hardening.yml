name: Security hardening
description: Report non-sensitive strict-mode, capability, sandbox, or denial-diagnostic issues.
title: "[Security]: "
labels: ["needs:triage", "type:security"]
body:
  - type: markdown
    attributes:
      value: |
        Do not post private exploits, secrets, or bypass instructions publicly.
        For sensitive vulnerabilities, follow .github/SECURITY.md instead.
        Use this template for non-sensitive hardening and diagnostics issues.
  - type: input
    id: intermed_version
    attributes:
      label: InterMed build or commit
      placeholder: v8.0-alpha-snapshot / commit abc1234
    validations:
      required: true
  - type: dropdown
    id: security_surface
    attributes:
      label: Security surface
      options:
        - Capability policy
        - File access
        - Network access
        - Reflection / MethodHandles
        - Unsafe / VarHandle / FFM
        - Native library / JNI / JNA
        - Async attribution / TCCL
        - Espresso sandbox
        - Wasm sandbox
        - Denial diagnostics
        - Other
    validations:
      required: true
  - type: dropdown
    id: strict_mode
    attributes:
      label: Strict mode
      options:
        - strict mode enabled
        - strict mode disabled
        - unknown
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected security behavior
      placeholder: The operation should be denied/allowed because...
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true
  - type: textarea
    id: policy
    attributes:
      label: Relevant policy/config
      placeholder: Paste non-sensitive capability profile or config, or say it is in the bundle.
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics bundle or sanitized log
      placeholder: Attach a sanitized bundle/log or explain why it cannot be shared publicly.
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I removed secrets, tokens, and private exploit details.
          required: true
        - label: I understand permissive compatibility runs are not security proof.
          required: true
