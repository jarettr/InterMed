name: Compatibility gap
description: Report a mod/API behavior that works on a native loader but not through InterMed.
title: "[Compat]: "
labels: ["needs:triage", "type:compatibility"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for a specific mod, API class/method, event, registry behavior,
        resource/data-pack behavior, or Mixin behavior that differs from native
        Forge/Fabric/NeoForge.
  - type: input
    id: intermed_version
    attributes:
      label: InterMed build or commit
      placeholder: v8.0-alpha-snapshot / commit abc1234
    validations:
      required: true
  - type: dropdown
    id: loader_family
    attributes:
      label: Native loader where it works
      options:
        - Fabric
        - Forge
        - NeoForge
        - Mixed loaders
        - Unknown
    validations:
      required: true
  - type: input
    id: minecraft_version
    attributes:
      label: Minecraft version
      placeholder: 1.20.1
    validations:
      required: true
  - type: textarea
    id: affected_mods
    attributes:
      label: Affected mod(s)
      placeholder: Mod name, version, source, and whether it is client/server/both.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Suspected area
      options:
        - API bridge
        - ClassLoader / dependency graph
        - Mixin
        - Remapping / reflection
        - Registry
        - VFS / resources / datapacks
        - Network / multiplayer
        - Unknown
    validations:
      required: true
  - type: textarea
    id: native_behavior
    attributes:
      label: Native-loader behavior
      description: What happens on regular Fabric/Forge/NeoForge?
      placeholder: On Forge 1.20.1, the mod reaches server ready state and...
    validations:
      required: true
  - type: textarea
    id: intermed_behavior
    attributes:
      label: InterMed behavior
      description: What differs when the same mod or pack is run through InterMed?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      placeholder: Smallest mod list and steps needed to reproduce.
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics bundle or report
      placeholder: Attach diagnostics bundle, compatibility report, or relevant log excerpt.
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I checked docs/known-limitations.md.
          required: true
        - label: I am not treating a permissive compatibility pass as strict-security proof.
          required: true
